    <!-- ============ RENDIMIENTO / CORE WEB VITALS ============ -->
    <!-- Preconecta cuanto antes con tu API y Cloudinary: reduce el tiempo hasta el primer byte de las llamadas fetch e imágenes -->
    <link rel="preconnect" href="https://domino-chain-production.up.railway.app" crossorigin />
    <link rel="dns-prefetch" href="https://domino-chain-production.up.railway.app" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fuente Syne usada en los títulos — cárgala con display=swap para evitar bloqueo de render -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ============ STRUCTURED DATA (JSON-LD) — Organization + WebApplication ============ -->

    <!-- ============ SEM: Google tag (gtag.js) ============ -->
    <!-- Sustituye G-XXXXXXXXXX por tu Measurement ID de GA4. Si usas Google Ads, añade también tu AW-ID con otro 'config'. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', { anonymize_ip: true });
      // Para conversiones de Google Ads, añade además:
      // gtag('config', 'AW-XXXXXXXXX');
    </script>
  </head>
  <body>
    <div id="root">
      <!--
        Fallback estático para crawlers que NO ejecutan JavaScript
        (la mayoría de bots de IA: GPTBot, PerplexityBot, ClaudeBot...).
        Googlebot sí renderiza React, pero esto da una red de seguridad
        y mejora el "GEO" (Generative Engine Optimization).
      -->
      <noscript>
        <main style="font-family:system-ui,sans-serif;background:#0b0b12;color:#fff;padding:40px 20px;text-align:center;">
          <h1>DOMINO — The Real-World Chain Reaction</h1>
          <p>Graba retos de 15 segundos, nomina a 3 personas y haz crecer la cadena dominó global. Retos de creatividad, kindness y eco-acción, en directo y en todo el mundo.</p>
          <p>Activa JavaScript en tu navegador para usar la app completa.</p>
        </main>
      </noscript>
    </div>
    <!-- Ajusta esta ruta si tu entry point no es src/main.tsx -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
