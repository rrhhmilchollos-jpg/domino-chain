<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00f5ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DOMINO" />

    <!-- Iconos Apple -->
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Iconos estándar -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- SEO -->
    <title>DOMINO — The Real-World Chain Reaction</title>
    <meta name="description" content="Completa retos de 15 segundos y pasa el testigo a 3 personas en cualquier rincón del mundo. Cada video crea una reacción en cadena visible en el mapa global." />
    <meta name="keywords" content="domino, reto viral, cadena, bondad, creatividad, eco, mapa global" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DOMINO — The Real-World Chain Reaction" />
    <meta property="og:description" content="Completa retos de 15 segundos y pasa el testigo a 3 personas. Cada video crea una reacción en cadena visible en el mapa global." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DOMINO" />
    <meta name="twitter:description" content="The Real-World Chain Reaction" />
    <meta name="twitter:image" content="/icons/icon-512.png" />

    <!-- Splash screens iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

    <style>
      /* Evitar flash de fondo blanco */
      html, body { background: #0b0b12; margin: 0; padding: 0; }
      /* Safe area para iPhone con notch */
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('[DOMINO SW] Registrado:', reg.scope);
            })
            .catch((err) => {
              console.warn('[DOMINO SW] Error al registrar:', err);
            });
        });
      }
    </script>
  </body>
</html>
